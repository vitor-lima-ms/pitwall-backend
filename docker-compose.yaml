services:
  api:
    build:
      context: ./
      dockerfile: Dockerfile.dev
    command: npm run start:debug
    container_name: backend-pitwall
    env_file:
      - .env
    image: backend-pitwall-image
    ports:
      - 3001:3001
      - 9229:9229
    volumes:
      - ./dist:/app/dist
      - ./src:/app/src